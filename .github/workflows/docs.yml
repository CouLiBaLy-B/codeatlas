name: Docs

# Dogfooding : CodeAtlas documente CodeAtlas et publie le site sur GitHub Pages.
# Prérequis (une fois) : Settings → Pages → Source = « GitHub Actions ».

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CodeAtlas
        run: python -m pip install --quiet -e ".[all]"
      - name: Generate documentation (self)
        run: codeatlas build . --out codeatlas-docs
      - name: Quality gate (self-check)
        run: codeatlas check .
      - uses: actions/upload-pages-artifact@v3
        with:
          path: codeatlas-docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
