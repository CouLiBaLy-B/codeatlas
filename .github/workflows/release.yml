name: Release

# Publication PyPI par Trusted Publishing (OIDC) : aucun token stocké.
# Prérequis (une fois) : enregistrer le trusted publisher sur pypi.org —
#   projet « codeatlas-doc », owner CouLiBaLy-B, repo codeatlas,
#   workflow release.yml, environnement pypi.
# Déclenchement : git tag vX.Y.Z && git push origin vX.Y.Z

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Smoke test wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet "$(ls dist/*.whl)[site]"
          /tmp/smoke/bin/codeatlas --version
          /tmp/smoke/bin/codeatlas build examples/python-demo --out /tmp/smoke-out --quiet
          test -f /tmp/smoke-out/site/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/codeatlas-doc
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
