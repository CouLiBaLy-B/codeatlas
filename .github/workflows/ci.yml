name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[site,dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Types (mypy)
        run: mypy
      - name: Tests + couverture (seuil 80 %)
        run: pytest --cov=codeatlas --cov-fail-under=80 -m "not slow"
