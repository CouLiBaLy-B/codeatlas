# Configuration CodeAtlas pour documenter CodeAtlas lui-même (dogfooding).

[project]
title = "CodeAtlas"
language = "fr"

[analysis]
exclude = [
    "examples/**",                    # corpus de test (contient des fichiers invalides volontaires)
    "tests/**",
    "specs/**",
    "action/**",
    "src/codeatlas/site/assets/**",   # mermaid/cytoscape vendorisés + JS maison
    "codeatlas-docs*/**",             # sorties générées (les nouveaux builds portent .codeatlas-generated)
]

# Note dogfooding : analyser depuis la racine du dépôt fonctionne (layout src/
# détecté automatiquement, feature 005) — les modules sont nommés `codeatlas.*`.

[check]
max_package_cycles = 0
min_doc_coverage = 45  # cliquet : état actuel 46 %, à remonter progressivement vers 60
